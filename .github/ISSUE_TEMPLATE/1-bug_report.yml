name: Bug report
description: Report a defect in UHD
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in the fields below - a minimal
        reproduction is the single most helpful thing you can provide.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Smallest example that triggers the bug. A code snippet or repo link is preferred.
      render: typescript
      placeholder: |
        // minimal repro
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include the full error message and stack trace if any.
    validations:
      required: true
  - type: input
    id: uhd-version
    attributes:
      label: UHD version
      description: Output of `npm ls @deltarobotics/uhd`, or the version in package.json.
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant - related issues, visualizer output, fixture definitions.
    validations:
      required: false
