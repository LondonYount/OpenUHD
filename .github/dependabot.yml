version: 2
updates:
  # Keep npm dependencies current (dev tooling: typescript, vitest, types).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # Keep GitHub Actions pinned-SHAs current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
